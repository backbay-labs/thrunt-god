name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, for example v0.1.0'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --force --tags origin
            git rev-parse "refs/tags/${TAG}" >/dev/null
            git checkout "refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/mcp/package-lock.json
            apps/vscode/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install MCP package dependencies
        run: npm --prefix apps/mcp ci

      - name: Install VS Code extension dependencies
        run: npm --prefix apps/vscode ci

      - name: Resolve package metadata
        id: package_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "mcp_name=$(node -p "require('./apps/mcp/package.json').name")" >> "$GITHUB_OUTPUT"
          echo "mcp_version=$(node -p "require('./apps/mcp/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify VS Code extension version matches release source
        shell: bash
        run: |
          set -euo pipefail
          ROOT_VERSION="${{ steps.package_meta.outputs.version }}"
          VSCODE_VERSION="$(node -p "require('./apps/vscode/package.json').version")"
          if [ "${VSCODE_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "apps/vscode/package.json version ${VSCODE_VERSION} does not match root package version ${ROOT_VERSION}" >&2
            exit 1
          fi

      - name: Verify MCP package version matches release source
        shell: bash
        run: |
          set -euo pipefail
          ROOT_VERSION="${{ steps.package_meta.outputs.version }}"
          MCP_VERSION="${{ steps.package_meta.outputs.mcp_version }}"
          if [ "${MCP_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "apps/mcp/package.json version ${MCP_VERSION} does not match root package version ${ROOT_VERSION}" >&2
            exit 1
          fi

      - name: Verify MCP package metadata matches release source
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_REPOSITORY_URL="https://github.com/${GITHUB_REPOSITORY}"
          ACTUAL_REPOSITORY_URL="$(node -p "const pkg=require('./apps/mcp/package.json'); (pkg.repository && (pkg.repository.url || pkg.repository)) || ''")"
          if [ "${ACTUAL_REPOSITORY_URL}" != "${EXPECTED_REPOSITORY_URL}" ]; then
            echo "apps/mcp/package.json repository.url must be ${EXPECTED_REPOSITORY_URL}, found ${ACTUAL_REPOSITORY_URL}" >&2
            exit 1
          fi

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="${{ steps.package_meta.outputs.version }}"
          ACTUAL_TAG="${{ steps.release_tag.outputs.tag }}"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${ACTUAL_TAG} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify package metadata matches release source
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_REPOSITORY_URL="https://github.com/${GITHUB_REPOSITORY}"
          ACTUAL_REPOSITORY_URL="$(node -p "const pkg=require('./package.json'); (pkg.repository && (pkg.repository.url || pkg.repository)) || ''")"
          if [ "${ACTUAL_REPOSITORY_URL}" != "${EXPECTED_REPOSITORY_URL}" ]; then
            echo "package.json repository.url must be ${EXPECTED_REPOSITORY_URL}, found ${ACTUAL_REPOSITORY_URL}" >&2
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run VS Code extension verification
        run: |
          npm run lint:vscode
          npm run test:vscode:unit
          npm run test:vscode:smoke

      - name: Build publish artifacts
        run: |
          rm -f apps/vscode/*.vsix
          npm run build:hooks
          npm --prefix apps/vscode run package
          npm pack --json > pack-output.json
          (
            cd apps/mcp
            npm pack --json > pack-output.json
          )

      - name: Check whether root package version already exists on npm
        id: root_npm_state
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.package_meta.outputs.name }}@${{ steps.package_meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether MCP package version already exists on npm
        id: mcp_npm_state
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.package_meta.outputs.mcp_name }}@${{ steps.package_meta.outputs.mcp_version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish root package to npm
        if: steps.root_npm_state.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Publish MCP package to npm
        if: steps.mcp_npm_state.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd apps/mcp
          npm publish --access public --provenance

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_FILE="$(node -e "const fs=require('fs'); const output=JSON.parse(fs.readFileSync('pack-output.json','utf8')); console.log(output[0].filename)")"
          MCP_PACKAGE_FILE="$(node -e "const fs=require('fs'); const output=JSON.parse(fs.readFileSync('apps/mcp/pack-output.json','utf8')); console.log(`apps/mcp/${output[0].filename}`)")"
          VSIX_FILE="$(find apps/vscode -maxdepth 1 -name '*.vsix' | head -n 1)"
          TAG="${{ steps.release_tag.outputs.tag }}"
          TITLE="${TAG} - VS Code Extension Alpha"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --title "${TITLE}"
            gh release upload "${TAG}" "${PACKAGE_FILE}" "${MCP_PACKAGE_FILE}" "${VSIX_FILE}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" "${PACKAGE_FILE}" "${MCP_PACKAGE_FILE}" "${VSIX_FILE}" --repo "${GITHUB_REPOSITORY}" --title "${TITLE}" --generate-notes
          fi
