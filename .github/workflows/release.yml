name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, for example v0.1.0'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --force --tags origin
            git rev-parse "refs/tags/${TAG}" >/dev/null
            git checkout "refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Resolve package metadata
        id: package_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="${{ steps.package_meta.outputs.version }}"
          ACTUAL_TAG="${{ steps.release_tag.outputs.tag }}"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${ACTUAL_TAG} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Verify package metadata matches release source
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_REPOSITORY_URL="https://github.com/${GITHUB_REPOSITORY}"
          ACTUAL_REPOSITORY_URL="$(node -p "const pkg=require('./package.json'); (pkg.repository && (pkg.repository.url || pkg.repository)) || ''")"
          if [ "${ACTUAL_REPOSITORY_URL}" != "${EXPECTED_REPOSITORY_URL}" ]; then
            echo "package.json repository.url must be ${EXPECTED_REPOSITORY_URL}, found ${ACTUAL_REPOSITORY_URL}" >&2
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build publish artifacts
        run: |
          npm run build:hooks
          npm pack --json > pack-output.json

      - name: Check whether version already exists on npm
        id: npm_state
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.package_meta.outputs.name }}@${{ steps.package_meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_state.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_FILE="$(node -e "const fs=require('fs'); const output=JSON.parse(fs.readFileSync('pack-output.json','utf8')); console.log(output[0].filename)")"
          TAG="${{ steps.release_tag.outputs.tag }}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${PACKAGE_FILE}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" "${PACKAGE_FILE}" --repo "${GITHUB_REPOSITORY}" --title "${TAG}" --generate-notes
          fi
