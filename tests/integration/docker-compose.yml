services:
  splunk:
    image: splunk/splunk:9.4
    platform: linux/amd64
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "TestPass123!"
      SPLUNK_HTTP_ENABLESSL: "false"
      SPLUNKD_SSL_ENABLE: "false"
    ports:
      - "18089:8089"
      - "18088:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8089/services/server/info", "-u", "admin:TestPass123!"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
